<body><main class="app">
  <header class="top"><div class="logo">⛑️</div><div><h1>Desafio SPT – Investigação do Subsolo</h1><p>Jogo avaliativo de Mecânica dos Solos</p></div><button class="teacher" onclick="openTeacher()">🔐 Modo professora</button></header>

<script>
const phases=[

];
const basic=[
 ['O que significa SPT?',['Standard Penetration Test','Soil Pressure Technology','Sistema de Projeto de Taludes','Sondagem Profunda Total'],0,'É o ensaio de penetração dinâmica padronizado, usado no reconhecimento do subsolo.'],
 ['Qual é a principal finalidade da investigação geotécnica?',['Conhecer o comportamento do subsolo para projetar com segurança','Substituir o projeto estrutural','Determinar apenas a cor do solo','Eliminar a necessidade de fundações'],0,'Ela revela camadas, resistência, água e outras condições importantes ao projeto.'],
 ['O valor NSPT representa:',['A soma dos golpes dos dois últimos trechos de 15 cm','A soma dos três trechos de 15 cm','A profundidade do furo','O peso do amostrador'],0,'O primeiro trecho funciona como assentamento; o NSPT considera os últimos 30 cm.'],
 ['No SPT, o martelo padrão tem qual característica?',['65 kg e queda de 75 cm','50 kg e queda de 1 m','75 kg e queda de 65 cm','100 kg e queda de 50 cm'],0,'A referência didática do ensaio usa martelo de 65 kg caindo 75 cm.'],
 ['Por que registrar o nível d’água é importante?',['Porque ele influencia o comportamento do solo e a execução da obra','Porque substitui o NSPT','Apenas para preencher o boletim','Porque define a cor da amostra'],0,'A presença e posição da água afetam tensões, escavações e soluções de fundação.'],
 ['Uma camada de solo é:',['Um trecho com características geotécnicas semelhantes','Uma fundação pronta','Uma ferramenta de perfuração','Uma medida de profundidade'],0,'O perfil de sondagem organiza o subsolo em materiais de comportamento e descrição semelhantes.'],
 ['O SPT ajuda o projeto de fundações porque:',['Indica resistência à penetração e o perfil do solo','Define sozinho toda a fundação','Mede diretamente a resistência do concreto','Dispensa o engenheiro geotécnico'],0,'Os resultados apoiam correlações e decisões técnicas, sempre com interpretação profissional.'],
 ['Sondagem de simples reconhecimento busca principalmente:',['Identificar estratigrafia, amostras, NSPT e nível d’água','Produzir concreto','Medir vento no terreno','Substituir ensaios de laboratório'],0,'Ela caracteriza preliminarmente o terreno para orientar o projeto.'],
 ['Qual situação pode causar recalques mesmo com sapata em camada resistente?',['Uma camada mole dentro do bulbo de tensões','Uma camada mais resistente abaixo','A existência do boletim','O uso de capacete na obra'],0,'As tensões se propagam em profundidade; camadas fracas abaixo também importam.'],
 ['As amostras do amostrador padrão são, em geral:',['Deformadas','Sempre indeformadas','Metálicas','Somente líquidas'],0,'A cravação altera a estrutura natural da amostra, limitando alguns ensaios laboratoriais.'],
 ['O SPT mede diretamente qual parâmetro?',['Nenhum parâmetro de resistência ao cisalhamento direto; fornece índice de golpes','Coesão exata','Módulo de elasticidade exato','Peso específico exato'],0,'O NSPT é um índice empírico, usado em correlações com cautela.'],
 ['Por que a sondagem reduz riscos em uma obra?',['Antecipando condições do subsolo que podem afetar fundações','Eliminando todas as incertezas','Tornando o concreto desnecessário','Evitando a locação da obra'],0,'Conhecer o terreno permite escolher soluções mais seguras e adequadas.']
 ,['Em geral, as amostras obtidas pelo amostrador padrão são:',['Deformadas','Sempre indeformadas','Metálicas','Apenas líquidas'],0,'A cravação altera a estrutura original do solo; por isso, são amostras deformadas.']
 ,['Quando se usa perfuração por lavagem com trépano?',['Quando o trado encontra resistência ou obstrução que dificulta o avanço','Para calcular o NSPT sem golpes','Somente para medir o nível d’água','Apenas antes da locação do furo'],0,'A circulação de água auxilia no avanço, na desagregação e na limpeza do furo em condições adequadas.']
];
const orderChallenges=[
 {steps:['Locação do furo','Perfuração inicial','Coleta inicial com trado','Posicionamento do amostrador padrão','Marcação dos 45 cm','Cravação com martelo','Contagem dos golpes em três trechos','Retirada do amostrador','Identificação da amostra','Registro no boletim'],hint:'Sequência completa de uma rodada de sondagem.'},
 {steps:['Posicionamento do amostrador padrão','Marcação dos 45 cm','Cravação com martelo','Contagem dos golpes em três trechos','Retirada do amostrador','Identificação da amostra'],hint:'Concentre-se na etapa de amostragem e registro.'},
 {steps:['Locação do furo','Perfuração inicial','Coleta inicial com trado','Registro das condições iniciais'],hint:'Início da investigação, antes do ensaio de cravação.'},
 {steps:['Retirada do amostrador','Identificação da amostra','Registro no boletim','Avanço do furo para a próxima cota'],hint:'O que acontece depois da cravação.'}
];
const calcCases=[[2,4,6],[4,7,9],[5,8,13],[7,11,14],[9,15,18],[11,17,23],[13,21,27],[6,12,20],[8,16,24],[10,18,29],[3,5,5],[1,3,4],[12,19,25],[15,24,30],[18,25,30],[20,28,30],[6,9,18],[4,10,17],[7,13,22],[9,20,28],[3,6,8],[5,10,15],[8,14,16],[12,18,22],[2,3,4],[9,13,17],[11,16,21],[13,19,26],[14,24,30],[6,7,9],[5,6,8],[1,2,2],[10,20,25],[15,22,28],[3,6,10]];
const reports=[
 {water:'2,8 m',layers:[['1,0 m','Areia fofa',[2,3,4]],['2,0 m','Areia medianamente compacta',[3,7,8]],['3,0 m','Argila rija',[4,12,13]]],q:'Qual camada apresenta menor resistência?',opts:['1,0 m — areia fofa','2,0 m — areia medianamente compacta','3,0 m — argila rija'],ans:0},
 {water:'3,5 m',layers:[['1,0 m','Argila mole',[1,2,3]],['2,0 m','Argila média',[3,5,6]],['3,0 m','Areia compacta',[5,14,15]]],q:'Em qual profundidade está a maior resistência à penetração?',opts:['1,0 m','2,0 m','3,0 m'],ans:2},
 {water:'1,9 m',layers:[['1,0 m','Silte argiloso',[2,4,5]],['2,0 m','Argila mole',[2,2,3]],['3,0 m','Areia compacta',[5,11,12]]],q:'Qual trecho merece maior atenção por sua baixa resistência?',opts:['1,0 m','2,0 m','3,0 m'],ans:1},
 {water:'Não observado',layers:[['1,0 m','Areia média',[3,8,8]],['2,0 m','Areia compacta',[4,13,14]],['3,0 m','Areia muito compacta',[8,20,21]]],q:'O solo tende a ficar mais resistente com a profundidade?',opts:['Não, os valores diminuem','Sim, os NSPT aumentam','Não é possível observar'],ans:1},
 {water:'4,2 m',layers:[['1,0 m','Argila rija',[4,11,12]],['2,0 m','Argila média',[3,6,7]],['3,0 m','Silte arenoso',[4,9,10]]],q:'Qual camada tem maior NSPT?',opts:['1,0 m','2,0 m','3,0 m'],ans:0}
];
const decisions=[
 ['Uma edificação possui área construída de 800 m². Considerando 1 sondagem a cada 200 m² até 1.200 m², qual é o número mínimo de sondagens?',['2','3','4','5'],2,'Até 1.200 m², aplica-se 1 sondagem a cada 200 m²: 800 ÷ 200 = 4.'],
 ['Uma edificação possui área construída de 1.600 m². Considerando 1 sondagem a cada 200 m² até 1.200 m² e mais 1 a cada 400 m² excedentes, qual é o número mínimo?',['6','7','8','9'],1,'São 6 sondagens para os primeiros 1.200 m² e mais 1 para os 400 m² excedentes: total 7.'],
 ['Quando o número de sondagens for superior a três, a distribuição dos furos:',['deve ficar preferencialmente em uma única linha','deve ser feita apenas no centro da edificação','não deve ocorrer ao longo de um mesmo alinhamento','deve ser definida apenas pelo mestre de obras'],2,'A distribuição deve representar a área em planta e evitar que todos os furos estejam em um único alinhamento.'],
 ['Na ausência de critério definido pela contratante, uma sondagem pode ser paralisada quando:',['o primeiro metro apresentar areia','forem obtidos 10 m consecutivos com NSPT maior ou igual a 25','for encontrada qualquer camada de argila','forem obtidos apenas 2 m consecutivos com NSPT maior ou igual a 10'],1,'Um dos critérios usuais é obter 10 m consecutivos com NSPT ≥ 25.'],
 ['Se o relatório de sondagem não apresentar o nível d’água:',['a sondagem passa automaticamente a ser rotativa','o NSPT deixa de existir','não há problema, pois o nível d’água não influencia fundações','o relatório pode estar incompleto, pois o nível d’água é uma informação importante'],3,'A posição do nível d’água influencia o comportamento do solo, escavações e decisões de fundação.'],
 ['Uma camada superficial tem NSPT alto, mas abaixo dela existe argila mole com NSPT baixo. A decisão mais adequada é:',['avaliar o perfil completo, pois camadas inferiores podem influenciar recalques','ignorar a camada inferior, pois a fundação apoia apenas na superfície','escolher sapata automaticamente','dispensar investigação complementar'],0,'As tensões se propagam em profundidade; camadas moles no bulbo de tensões podem causar recalques.'],
 ['A sondagem rotativa é mais indicada quando:',['se deseja substituir o relatório de sondagem','se deseja apenas medir o nível d’água em areia superficial','se deseja investigar alteração de rocha ou rocha','se deseja evitar qualquer amostragem'],2,'A técnica rotativa é adequada para investigar material de alteração de rocha e rocha, com obtenção de testemunhos.'],
 ['A sondagem mista ocorre quando:',['o NSPT é calculado com os três trechos','a mesma sondagem investiga solo, alteração de rocha e rocha','são misturados concreto e solo','o ensaio é feito sem amostrador'],1,'A sondagem mista combina técnicas conforme o material encontrado no subsolo.'],
 ['Uma limitação do SPT é:',['não permitir identificação de camadas','depender de correlações empíricas para estimar alguns parâmetros','fornecer diretamente todos os parâmetros de resistência e deformabilidade','não permitir nenhuma informação sobre o solo'],1,'O NSPT é um índice de penetração; estimativas de outros parâmetros dependem de correlações e julgamento técnico.'],
 ['O SPT coleta, em geral:',['corpos de prova de concreto','apenas água','amostras indeformadas perfeitas','amostras deformadas'],3,'O processo de cravação altera a estrutura natural da amostra; por isso, ela é usualmente deformada.'],
 ['O critério de paralisação com 8 m consecutivos exige:',['NSPT ≥ 25','NSPT ≥ 30','NSPT ≥ 35','NSPT ≥ 40'],1,'O critério citado para 8 m consecutivos é NSPT maior ou igual a 30.'],
 ['O critério de paralisação com 6 m consecutivos exige:',['NSPT ≥ 35','NSPT ≥ 25','NSPT ≥ 20','NSPT ≥ 30'],0,'O critério citado para 6 m consecutivos é NSPT maior ou igual a 35.'],
 ['Se um relatório mostra apenas um NSPT médio, sem o perfil por profundidade, a interpretação:',['fica limitada, pois perde a variação das camadas','fica mais completa','dispensa o nível d’água','permite definir a fundação automaticamente'],0,'O perfil ao longo da profundidade é essencial para compreender a estratigrafia e as camadas críticas.'],
 ['Dois furos próximos apresentam perfis muito diferentes. A leitura técnica mais adequada é:',['o terreno pode ser variável e merece atenção na interpretação','o furo com menor NSPT deve ser descartado','somente o maior NSPT é relevante','a investigação deve ser ignorada'],0,'Diferenças entre furos podem revelar variabilidade espacial do subsolo.'],
 ['Um perfil com NSPT muito baixo nos primeiros metros e nível d’água raso exige:',['análise cuidadosa para escavações e fundações','dispensa de projeto geotécnico','conclusão imediata de que há rocha','eliminação da descrição do solo'],0,'Baixa resistência e água rasa podem afetar execução, estabilidade e desempenho das fundações.']
];
let state={teams:[],phase:0,round:0,turn:0,sets:{},timer:null,time:60};
const $=s=>document.querySelector(s); const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function startGame(){const name=$('#playerName').value.trim()||'Grupo sem nome';state={teams:[{name,score:0}],phase:0,round:0,turn:0,sets:{basic:shuffle(basic).slice(0,6),order:shuffle([...orderChallenges,...orderChallenges]).slice(0,6),calc:shuffle(calcCases).slice(0,6),report:shuffle(reports).slice(0,5),decision:shuffle(decisions).slice(0,5)},slots:{basic:shuffle([0,1,2,3,0,1]),report:shuffle([0,1,2,3,0]),decision:shuffle([0,1,2,3,0])},phaseScores:[0,0,0,0,0],correct:0,errors:0,startedAt:Date.now(),timer:null,time:60};$('#setup').classList.add('hidden');$('#final').classList.add('hidden');$('#game').classList.remove('hidden');renderRound()}
function renderScore(){ $('#scoreboard').innerHTML=state.teams.map(t=>`<div class="team-score active">👷 ${t.name}<b>${t.score} pts</b></div>`).join('') }
function renderRound(){clearInterval(state.timer);const ph=phases[state.phase];if(!ph){finishGame();return}if(state.round>=ph.count){state.phase++;state.round=0;renderRound();return}$('#phaseLabel').textContent=`${ph.title} · rodada ${state.round+1} de ${ph.count}`;$('#phaseTitle').textContent=ph.subtitle;const done=phases.slice(0,state.phase).reduce((s,p)=>s+p.count,0)+state.round;const total=phases.reduce((s,p)=>s+p.count,0);$('#progressFill').style.width=`${(done/total)*100}%`;renderScore();const item=state.sets[ph.key][state.round]; if(ph.key==='basic')renderChoice(item,10);if(ph.key==='order')renderOrder(item);if(ph.key==='calc')renderCalc(item);if(ph.key==='report')renderReport(item);if(ph.key==='decision')renderChoice(item,30);startTimer()}
function startTimer(){const el=$('#timer');if(!$('#timerEnabled').checked){el.classList.add('hidden');return}el.classList.remove('hidden');state.time=60;el.textContent='1:00';state.timer=setInterval(()=>{state.time--;el.textContent=`0:${String(state.time).padStart(2,'0')}`;if(state.time<=0){clearInterval(state.timer);showFeedback(false,'Tempo encerrado. Nenhum ponto nesta rodada.','attention');disableInputs()}},1000)}
function disableInputs(){document.querySelectorAll('#content button,input').forEach(x=>x.disabled=true);$('#content').insertAdjacentHTML('beforeend',`<div class="actions"><button class="primary" onclick="nextRound()">Próxima questão →</button></div>`)}
function teamName(){return state.teams[state.turn].name}
function positionOptions(opts,originalAnswer,slot){const correct=opts[originalAnswer],wrong=shuffle(opts.filter((_,i)=>i!==originalAnswer)),positioned=[];for(let i=0;i<4;i++)positioned[i]=i===slot?correct:wrong.shift();return{opts:positioned,ans:slot}}
window.answerChoice=answerChoice;
function renderMultipleChoice(question,options,correct,points,explanation,extra=''){state.currentExplain=explanation;$('#content').innerHTML=`<p class="tiny">Grupo: <b>${teamName()}</b> · vale ${points} pontos</p>${extra}<div class="question">${question}</div><div class="options">${options.map((option,index)=>`<button type="button" class="option" data-choice="${index}" onclick="window.answerChoice(${index},${correct},${points},this)">${String.fromCharCode(65+index)}. ${option}</button>`).join('')}</div>`}
function renderChoice(item,points){const[q,opts,ans,explain]=item,phaseKey=phases[state.phase].key,placed=positionOptions(opts,ans,state.slots[phaseKey][state.round]);renderMultipleChoice(q,placed.opts,placed.ans,points,explain)}
function answerChoice(chosen,ans,points,button){if(document.querySelector('.feedback')||!button)return;clearInterval(state.timer);if(!Array.isArray(state.phaseScores))state.phaseScores=[0,0,0,0,0];if(typeof state.correct!=='number')state.correct=0;if(typeof state.errors!=='number')state.errors=0;const ok=chosen===ans;document.querySelectorAll('.option').forEach(b=>b.disabled=true);button.classList.add(ok?'correct':'wrong');if(!ok)document.querySelectorAll('.option')[ans].classList.add('correct');if(ok){state.teams[0].score+=points;state.phaseScores[state.phase]+=points;state.correct++}else state.errors++;showFeedback(ok,ok?`Correto — ${points} pontos. ${state.currentExplain}`:`Incorreto — 0 ponto. ${state.currentExplain}`);renderScore();nextButton()}
function renderOrder(ch){let current=shuffle(ch.steps);const draw=()=>{$('#content').innerHTML=`<p class="tiny">Grupo: <b>${teamName()}</b> · vale 15 pontos</p><div class="question">Coloque as etapas na ordem correta.</div><p class="tiny">${ch.hint} Use as setas para mover cada item.</p><div class="order-list">${current.map((s,i)=>`<div class="order-item"><span class="order-num">${i+1}</span><span class="order-text">${s}</span><button class="mini" ${i===0?'disabled':''} onclick="moveOrder(${i},-1)">↑</button><button class="mini" ${i===current.length-1?'disabled':''} onclick="moveOrder(${i},1)">↓</button></div>`).join('')}</div><div class="actions"><button class="primary" onclick="checkOrder()">Confirmar ordem</button></div>`};window.moveOrder=(i,d)=>{[current[i],current[i+d]]=[current[i+d],current[i]];draw()};window.checkOrder=()=>{clearInterval(state.timer);const errors=current.reduce((n,x,i)=>n+(x!==ch.steps[i]),0),ok=errors===0;if(ok){state.teams[0].score+=15;state.phaseScores[1]+=15;state.correct++}else state.errors++;disableOrder();showFeedback(ok,ok?'Correto — 15 pontos!':'Incorreto — 0 ponto. Revise a sequência de execução.',ok?'ok':'no');renderScore();nextButton()};draw()}
function disableOrder(){document.querySelectorAll('#content button').forEach(b=>b.disabled=true)}
function renderCalc(c){const n=c[1]+c[2];$('#content').innerHTML=`<p class="tiny">Grupo: <b>${teamName()}</b> · vale 20 pontos</p><div class="question">Calcule o NSPT do ensaio.</div><div class="nsp-grid">${c.map((x,i)=>`<div class="blow"><span>${i+1}º trecho</span><strong>${x}</strong><small>golpes / 15 cm</small></div>`).join('')}</div><div class="answer-row"><input id="calcAnswer" type="number" inputmode="numeric" placeholder="NSPT"><button class="primary" onclick="checkCalc(${n})">Responder</button></div>`}
function checkCalc(n){clearInterval(state.timer);const correct=+$('#calcAnswer').value===n;if(correct){state.teams[0].score+=20;state.phaseScores[2]+=20;state.correct++}else state.errors++;disableInputs();showFeedback(correct,correct?'Correto — 20 pontos. O NSPT corresponde à soma dos golpes dos dois últimos trechos de 15 cm.':'Incorreto — 0 ponto. O NSPT corresponde à soma dos golpes dos dois últimos trechos de 15 cm.',correct?'ok':'no');renderScore()}
function renderReport(r){const rows=r.layers.map(l=>{const n=l[2][1]+l[2][2];return `<div class="layer"><div><b>${l[0]}</b><br><small>${l[1]}</small></div><div class="bar" style="width:${Math.min(n*3.3,100)}%"></div><b>${n}</b></div>`}).join(''),placed=positionOptions(r.opts,r.ans,state.slots.report[state.round]),extra=`<div class="profile"><b>📄 Mini perfil SPT</b>${rows}<div class="water">💧 Nível d’água: ${r.water}</div></div>`;renderMultipleChoice(r.q,placed.opts,placed.ans,25,'Observe que o NSPT é a soma dos dois últimos trechos e compare os valores do perfil.',extra)}
function showFeedback(ok,msg,type){const c=$('#content');c.insertAdjacentHTML('beforeend',`<div class="feedback ${type||(ok?'ok':'no')}">${ok?'✓':'!'} ${msg}</div>`)}
function nextButton(){ $('#content').insertAdjacentHTML('beforeend',`<div class="actions"><button class="primary" onclick="nextRound()">Continuar para a próxima questão →</button></div>`);document.querySelector('#content .actions:last-child')?.scrollIntoView({behavior:'smooth',block:'nearest'})}
function nextRound(){state.round++;renderRound()}
function finishGame(){clearInterval(state.timer);$('#game').classList.add('hidden');const player=state.teams[0],max=545,pct=Math.round(player.score/max*100),sec=Math.round((Date.now()-state.startedAt)/1000),time=`${Math.floor(sec/60)} min ${sec%60} s`,level=pct>=90?'Excelente domínio sobre sondagem SPT.':pct>=75?'Bom domínio, com pequenos ajustes.':pct>=60?'Conhecimento básico: revise interpretação e cálculo.':'Precisa revisar os conceitos fundamentais de SPT.',names=['Conceitos','Execução SPT','Cálculo NSPT','Perfil geotécnico','Decisão técnica'],maxes=[60,90,120,125,150];$('#final').classList.remove('hidden');$('#final').innerHTML=`<div class="phase">Relatório final do grupo</div><h2>🏆 Avaliação concluída</h2><p><b>Grupo:</b> ${player.name} · <b>Data:</b> ${new Date().toLocaleDateString('pt-BR')}</p><div class="ranking"><div class="rank first"><span class="medal">🏗️</span><div><b>${player.score} / ${max} pontos (${pct}%)</b><div class="tiny">${level}</div></div></div><div class="rank"><div>⏱️ Tempo total: <b>${time}</b><br>✓ Acertos: <b>${state.correct}</b> · ✕ Erros: <b>${state.errors}</b></div></div>${names.map((n,i)=>`<div class="rank"><b>Fase ${i+1} — ${n}</b><strong style="margin-left:auto">${state.phaseScores[i]} / ${maxes[i]} pts</strong></div>`).join('')}</div><div class="feedback attention"><b>Critérios de desempate:</b><br>1º maior pontuação na Fase 3; 2º maior pontuação na Fase 4; 3º maior pontuação na Fase 5; 4º menor tempo total de jogo.<br><br><b>Anotação da professora:</b> Grupo: ${player.name} | Total: ${player.score} | F3: ${state.phaseScores[2]} | F4: ${state.phaseScores[3]} | F5: ${state.phaseScores[4]} | Tempo: ${time}<br><br>Assinatura da professora: ____________________________________</div><div class="actions"><button class="primary" onclick="window.print()">🖨️ Imprimir resultado</button><button class="secondary" onclick="$('#setup').classList.remove('hidden');$('#final').classList.add('hidden')">Reiniciar para próximo grupo</button></div>`}
function tieBreaker(){const qs=['Explique por que o primeiro trecho de 15 cm não entra no NSPT.','Por que uma camada mole abaixo de uma sapata pode ser crítica?','Quais informações do relatório ajudam a localizar o nível d’água?','Por que a distribuição dos furos em planta importa?','Qual é a diferença central entre sondagem à percussão e rotativa?'];const q=shuffle(qs)[0];$('#modal').classList.remove('hidden');$('#modal').innerHTML=`<div class="modal-box"><h2>⚖️ Desempate</h2><p><b>${q}</b></p><textarea class="tie-answer" placeholder="Registre a resposta da equipe..."></textarea><p class="tiny">A avaliação é manual. A professora pode atribuir até 20 pontos no placar, se desejar.</p><div class="actions"><button class="primary" onclick="closeModal()">Concluir avaliação</button></div></div>`}
function openTeacher(){$('#modal').classList.remove('hidden');$('#modal').innerHTML=`<div class="modal-box"><h2>🔐 Modo professora</h2><p>Digite a senha para acessar o gabarito completo.</p><input id="pass" type="password" placeholder="Senha"><div class="actions"><button class="primary" onclick="unlockTeacher()">Entrar</button><button class="secondary" onclick="closeModal()">Cancelar</button></div></div>`}
function unlockTeacher(){if($('#pass').value!=='spt2026'){alert('Senha incorreta.');return}const all=[...basic.map(x=>({q:x[0],a:x[1][x[2]]})),...decisions.map(x=>({q:x[0],a:x[1][x[2]]}))];$('#modal').innerHTML=`<div class="modal-box"><h2>📚 Gabarito da professora</h2><p class="tiny">Senha validada. As respostas abaixo não aparecem no modo aluno.</p><div class="teacher-grid">${all.map((x,i)=>`<div class="key-item"><b>${i+1}. ${x.q}</b><br><span>Resposta: ${x.a}</span></div>`).join('')}<div class="key-item"><b>NSPT</b><br>Some os golpes do 2º e do 3º trechos de 15 cm.</div><div class="key-item"><b>Ordenação</b><br>Consulte a sequência definida em cada desafio: locação/perfuração → amostragem → identificação e registro.</div></div><div class="actions"><button class="secondary" onclick="closeModal()">Fechar</button></div></div>`}
function openTieCalculator(){$('#modal').classList.remove('hidden');$('#modal').innerHTML=`<div class="modal-box"><h2>🧮 Calculadora de desempate</h2><p class="tiny">Use quando dois ou mais alunos terminarem com a mesma pontuação. A professora atribui de 0 a 20 pontos para a resposta aberta.</p><div class="settings"><label>Aluno A<input id="tieNameA" type="text" placeholder="Nome"></label><label>Pontos da partida<input id="tieBaseA" type="number" min="0" placeholder="Ex.: 235"></label><label>Desempate (0–20)<input id="tieExtraA" type="number" min="0" max="20" value="0"></label></div><div class="settings"><label>Aluno B<input id="tieNameB" type="text" placeholder="Nome"></label><label>Pontos da partida<input id="tieBaseB" type="number" min="0" placeholder="Ex.: 235"></label><label>Desempate (0–20)<input id="tieExtraB" type="number" min="0" max="20" value="0"></label></div><div class="actions"><button class="primary" onclick="calculateTie()">Calcular resultado</button><button class="secondary" onclick="closeModal()">Fechar</button></div><div id="tieResult"></div></div>`}
function calculateTie(){const a={name:$('#tieNameA').value.trim()||'Aluno A',base:+$('#tieBaseA').value||0,extra:Math.min(20,Math.max(0,+$('#tieExtraA').value||0))},b={name:$('#tieNameB').value.trim()||'Aluno B',base:+$('#tieBaseB').value||0,extra:Math.min(20,Math.max(0,+$('#tieExtraB').value||0))};const at=a.base+a.extra,bt=b.base+b.extra;const result=at===bt?'Empate mantido — aplique outra pergunta aberta ou outro critério previamente definido.':`${at>bt?a.name:b.name} vence o desempate.`;$('#tieResult').innerHTML=`<div class="feedback attention"><b>${a.name}:</b> ${a.base} + ${a.extra} = ${at} pontos<br><b>${b.name}:</b> ${b.base} + ${b.extra} = ${bt} pontos<br><br>${result}</div>`}
function closeModal(){$('#modal').classList.add('hidden');$('#modal').innerHTML=''}
</script></body></html>
